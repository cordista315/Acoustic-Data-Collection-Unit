<svg viewBox="0 0 1000 1650" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <!-- Background -->
  <rect width="1000" height="1650" fill="#FFFFFF"/>
  
  <!-- Header -->
  <rect width="1000" height="80" fill="#2C3E50"/>
  <text x="500" y="50" text-anchor="middle" font-size="24" font-weight="bold" fill="#FFFFFF">BLE Turntable Controller — Logic Flow v2.3.0</text>

  <defs>
    <marker id="arrowhead" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#555"/>
    </marker>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- 1. TOP LEVEL: SETUP -->
  <ellipse cx="500" cy="140" rx="80" ry="30" fill="#34495E" filter="url(#shadow)"/>
  <text x="500" y="146" text-anchor="middle" font-size="16" font-weight="bold" fill="white">START</text>
  
  <path d="M500,170 V210" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/>

  <rect x="350" y="210" width="300" height="80" rx="10" fill="#EBF5FB" stroke="#2E86C1" stroke-width="2"/>
  <text x="500" y="245" text-anchor="middle" font-size="16" font-weight="bold" fill="#21618C">setup()</text>
  <text x="500" y="265" text-anchor="middle" font-size="13" fill="#555">BLE Init &amp; Motor Config</text>

  <path d="M500,290 V340" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- 2. MAIN LOOP ENTRY -->
  <rect x="350" y="340" width="300" height="60" rx="10" fill="#D5F5E3" stroke="#27AE60" stroke-width="2" filter="url(#shadow)"/>
  <text x="500" y="375" text-anchor="middle" font-size="18" font-weight="bold" fill="#186A3B">loop()</text>
  
  <path d="M500,400 V440" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- 3. MODE SELECTOR (The Hub) -->
  <polygon points="500,440 660,500 500,560 340,500" fill="#FEF9E7" stroke="#D4AC0D" stroke-width="2"/>
  <text x="500" y="505" text-anchor="middle" font-size="14" font-weight="bold">currentMode?</text>

  <!-- BRANCHES -->
  <!-- IDLE -->
  <path d="M340,500 H150 V600" stroke="#7F8C8D" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <rect x="50" y="600" width="200" height="70" rx="10" fill="#F4F6F7" stroke="#7F8C8D" stroke-width="2"/>
  <text x="150" y="630" text-anchor="middle" font-size="14" font-weight="bold">IDLE</text>
  <text x="150" y="650" text-anchor="middle" font-size="12" fill="#555">Waiting for BLE</text>

  <!-- SCANNING -->
  <path d="M660,500 H850 V600" stroke="#8E44AD" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <rect x="750" y="600" width="200" height="70" rx="10" fill="#F5EEF8" stroke="#8E44AD" stroke-width="2"/>
  <text x="850" y="630" text-anchor="middle" font-size="14" font-weight="bold">SCANNING</text>
  <text x="850" y="650" text-anchor="middle" font-size="12" fill="#555">Wait for ACK</text>

  <!-- SWEEPING -->
  <path d="M500,560 V600" stroke="#E67E22" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <rect x="350" y="600" width="300" height="70" rx="10" fill="#FEF5E7" stroke="#E67E22" stroke-width="2"/>
  <text x="500" y="630" text-anchor="middle" font-size="14" font-weight="bold">SWEEPING</text>
  <text x="500" y="650" text-anchor="middle" font-size="12" fill="#555">Dwell &amp; Auto-Step</text>

  <!-- 4. ASYNC COMMAND MANIFOLD -->
  <rect x="50" y="740" width="900" height="150" rx="15" fill="#F0F3F4" stroke="#3498DB" stroke-width="2" stroke-dasharray="10,5"/>
  <text x="500" y="775" text-anchor="middle" font-size="18" font-weight="bold" fill="#2980B9">BLE Async Callback (RxCallbacks)</text>
  <text x="500" y="805" text-anchor="middle" font-size="13" fill="#555">Manual GOTO, STEP, BACK, and Mode Setting commands enter here</text>

  <!-- THE CONVERGENCE (Funneling all nodes to Movement) -->
  <!-- From IDLE -->
  <path d="M150,670 V740" stroke="#7F8C8D" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <!-- From SWEEP -->
  <path d="M500,670 V740" stroke="#E67E22" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <!-- From SCAN -->
  <path d="M850,670 V740" stroke="#8E44AD" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>

  <!-- Exit from Manifold to Movement -->
  <path d="M500,890 V950" stroke="#16A085" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <text x="515" y="930" font-size="14" font-weight="bold" fill="#16A085">CALL MOTION</text>

  <!-- 5. CENTRAL MOVEMENT NODE -->
  <rect x="250" y="950" width="500" height="200" rx="12" fill="#E8F8F5" stroke="#16A085" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="500" y="990" text-anchor="middle" font-size="20" font-weight="bold" fill="#0E6251">moveToSteps(target)</text>
  <line x1="280" y1="1005" x2="720" y2="1005" stroke="#16A085" stroke-width="1.5"/>
  
  <g font-size="14" fill="#111">
    <text x="280" y="1035">1. Target Normalization (0-799 steps)</text>
    <text x="280" y="1060">2. Determine shortest rotation (CW vs CCW)</text>
    <text x="280" y="1085">3. Execute Anti-Backlash Approach</text>
    <text x="280" y="1110">4. Pulse STEP pin &amp; Notify BLE Client</text>
  </g>

  <!-- 6. THE RETURN PATH -->
  <path d="M500,1150 V1220" stroke="#555" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <text x="510" y="1200" font-size="14" font-weight="bold" fill="#555">EXIT TO LOOP</text>

  <!-- Join point for branches that didn't move -->
  <rect x="400" y="1220" width="200" height="50" rx="10" fill="#EBEDEF" stroke="#BDC3C7" stroke-width="2"/>
  <text x="500" y="1250" text-anchor="middle" font-size="14" font-weight="bold">Cleanup &amp; Yield</text>

  <!-- THE CLEAR LOOPBACK -->
  <path d="M600,1245 H940 V370 H650" stroke="#555" stroke-width="2" fill="none" stroke-dasharray="10,5" marker-end="url(#arrowhead)"/>
  
  <rect x="880" y="700" width="120" height="40" rx="5" fill="white" stroke="#555"/>
  <text x="940" y="725" text-anchor="middle" font-size="12" font-weight="bold" transform="rotate(90, 940, 725)">LOOP BACK</text>

  <!-- Footer -->
  <line x1="100" y1="1350" x2="900" y2="1350" stroke="#D5DBDB" stroke-width="1"/>
  <text x="500" y="1390" text-anchor="middle" font-size="14" fill="#95A5A6" font-style="italic">ReSpeaker Edition v2.3.0 — Mercer University ECE</text>
</svg>
